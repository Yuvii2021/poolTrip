server:
  port: 8090

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/travel_marketplace?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: 12345678
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

app:
  jwt:
    secret: TravelHubSecretKey2024VeryLongSecureKeyForJWTTokenGeneration123456789
    expiration: 86400000 # 24 hours in milliseconds
  upload:
    dir: uploads

logging:
  level:
    com.travelhub: DEBUG
    org.springframework.security: DEBUG

